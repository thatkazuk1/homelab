name: handbook

on:
  push:
    branches:
      - master
    paths:
      - handbook/**
      - .forgejo/workflows/handbook.yml

jobs:
  build-push:
    runs-on: docker
    steps:
      - name: bootstrap node
        run: apk add --no-cache nodejs

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: forgejo.ts.kazuki.uk
          username: kazuki
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./handbook
          push: true
          tags: |
            forgejo.ts.kazuki.uk/shokunbi/handbook:main
            forgejo.ts.kazuki.uk/shokunbi/handbook:${{ github.sha }}
          cache-from: type=registry,ref=forgejo.ts.kazuki.uk/shokunbi/handbook:buildcache
          cache-to: type=registry,ref=forgejo.ts.kazuki.uk/shokunbi/handbook:buildcache,mode=max
