name: Renovate

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: docker
    steps:
      - name: Run Renovate
        run: |
          docker run --rm \
            -e RENOVATE_TOKEN="${RENOVATE_TOKEN}" \
            -e RENOVATE_PLATFORM=forgejo \
            -e RENOVATE_ENDPOINT="https://forgejo.ts.kazuki.uk/api/v1" \
            -e RENOVATE_REPOSITORIES=kazuki/homelab \
            -e RENOVATE_AUTODISCOVER=false \
            -e RENOVATE_GITHUB_COM_TOKEN="${RENOVATE_GITHUB_COM_TOKEN}" \
            renovate/renovate:latest
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}
