site_name: Kazuki's Homelab Handbook
site_description: A living reference for a self-hosted, GitOps-managed homelab.
site_url: http://handbook.lan:8092/
repo_url: https://github.com/meetKazuki/homelab
repo_name: meetKazuki/homelab
edit_uri: edit/master/handbook/docs/
strict: true

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - extra/tweaks.css

nav:
  - Home: index.md
  - Getting Started:
      - SSH: getting-started/ssh.md
      - SOPS and age: getting-started/sops.md
  - Architecture:
      - Overview: architecture/overview.md
  - Operations:
      - Adopting a stack: operations/adopting-a-stack.md
      - Maintaining the handbook: operations/maintaining-handbook.md
  - Conventions: conventions/index.md
  - Decisions: decisions/index.md

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
