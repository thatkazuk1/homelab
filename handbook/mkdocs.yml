site_name: Kazuki's Homelab Handbook
site_url: http://handbook.lan:8092/
repo_url: https://github.com/meetKazuki/homelab
edit_uri: edit/master/handbook/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started:
      - SSH: getting-started/ssh.md
      - SOPS and age: getting-started/sops.md
  - Architecture:
      - Overview: architecture/overview.md
  - Operations:
      - Adopting a stack: operations/adopting-a-stack.md
      - Maintaining the handbook: operations/maintaining-handbook.md
  - Conventions: conventions/index.md
  - Decisions: decisions/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
