x-meta:
  name: garage
  host: garage-prod-01
  category: storage
  description: >
    S3-compatible object storage backing the fleet's backup, media, and
    attachment needs.
  status: adopted
  public_url: garage.ts.kazuki.uk

services:
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/homelab/garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data

  webui:
    image: khairul169/garage-webui:1.1.0
    container_name: garage-webui
    restart: unless-stopped
    network_mode: host
    depends_on:
      - garage
    volumes:
      - /opt/homelab/garage/garage.toml:/etc/garage.toml:ro
    environment:
      API_BASE_URL: "http://127.0.0.1:3903"
      S3_ENDPOINT_URL: "http://127.0.0.1:3900"

volumes:
  garage-meta:
    name: garage-meta
  garage-data:
    name: garage-data
