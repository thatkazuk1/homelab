x-meta:
  name: portainer
  host: docker-prod-01
  category: orchestration
  description: >
    Central Docker management UI for the fleet's remote environments —
    predates the Komodo/GitOps pipeline, still used for ad-hoc inspection
    and manual operations.
  status: adopted

services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
