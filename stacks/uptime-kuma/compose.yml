services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    network_mode: host
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Lagos
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  uptime-kuma-data:
    name: uptime-kuma-data
