x-meta:
  name: uptime-kuma
  host: core-01
  category: monitoring
  description: >
    Uptime and status monitoring for the fleet — HTTP/TCP/ping checks
    across services with historical uptime data and alerting.
  status: adopted
  adrs:
    - 2

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    network_mode: host
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Lagos
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  uptime-kuma-data:
    external: true
