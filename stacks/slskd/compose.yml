x-meta:
  name: slskd
  host: nas-01
  category: media
  description: >
    Soulseek client with a web UI and remote-configurable API.
  status: adopted
  adrs:
    - 10

name: slskd

services:
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    ports:
      - "5030:5030"
      - "5031:5031"
      - "50300:50300"
    environment:
      - PUID=1006
      - PGID=997
      - TZ=Africa/Lagos
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SLSK_USERNAME=${SLSKD_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_PASSWORD}
      - SLSKD_API_KEY
      - SLSKD_USERNAME
      - SLSKD_PASSWORD
      - SLSKD_DOWNLOADS_DIR=/downloads/torrents
      - SLSKD_INCOMPLETE_DIR=/downloads/torrenting
      - SLSKD_SHARED_DIR=/media/music
    volumes:
      - /Volume1/@apps/homelab/slskd/config:/app
      - /Volume1/nexus-pve/downloads:/downloads
      - /Volume1/nexus-pve/media:/media
