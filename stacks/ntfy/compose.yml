x-meta:
  name: ntfy
  host: core-01
  category: notifications
  description: >
    Self-hosted push-notification service — the fleet's alerting transport,
    including native Komodo deploy/failure alerts.
  status: adopted
  adrs:
    - 2
  public_url: ntfy.kazuki.uk

services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    labels:
      - "sprint-3p-webhook-timing-test=true"
    ports:
      - 8085:80
    init: true
    volumes:
      - /opt/homelab/ntfy/config:/var/lib/ntfy
    command:
      - serve
    environment:
      - NTFY_BASE_URL=https://ntfy.kazuki.uk
      - NTFY_CACHE_FILE=/var/lib/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_BEHIND_PROXY=true
      - NTFY_ATTACHMENT_CACHE_DIR=/var/lib/ntfy/attachments
      - NTFY_ENABLE_LOGIN=false
      - NTFY_WEB_ROOT=disable
      - TZ=Africa/Lagos
      - PUID=1000
      - PGID=1000
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
