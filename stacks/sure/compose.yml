name: sure

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-maybe_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maybe_password}
  POSTGRES_DB: ${POSTGRES_DB:-maybe_production}

x-rails-env: &rails_env
  <<: *db_env
  TZ: "Africa/Lagos"
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: true
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  APP_DOMAIN: ${APP_DOMAIN}
  SMTP_ADDRESS: ${SMTP_ADDRESS}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_TLS_ENABLED: ${SMTP_TLS_ENABLED}
  ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE}
  GENERIC_S3_ACCESS_KEY_ID: ${GENERIC_S3_ACCESS_KEY_ID}
  GENERIC_S3_SECRET_ACCESS_KEY: ${GENERIC_S3_SECRET_ACCESS_KEY}
  GENERIC_S3_REGION: ${GENERIC_S3_REGION}
  GENERIC_S3_BUCKET: ${GENERIC_S3_BUCKET}
  GENERIC_S3_ENDPOINT: ${GENERIC_S3_ENDPOINT}
  GENERIC_S3_FORCE_PATH_STYLE: ${GENERIC_S3_FORCE_PATH_STYLE}

services:
  web:
    image: ghcr.io/we-promise/sure:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - app-storage:/rails/storage
    environment:
      <<: *rails_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sureos

  worker:
    image: ghcr.io/we-promise/sure:latest
    command: bundle exec sidekiq
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *rails_env
    networks:
      - sureos

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sureos

  redis:
    image: redis:8.0.2
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sureos

volumes:
  app-storage:
  postgres-data:
  redis-data:

networks:
  sureos:
    external: true

