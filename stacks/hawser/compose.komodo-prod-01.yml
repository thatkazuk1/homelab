x-meta:
  name: hawser-komodo-prod-01
  host: komodo-prod-01
  category: orchestration
  description: >
    Hawser agent for Dockhand remote management. Standard mode; listens
    on port 2376, authenticated via TOKEN env var.
  status: adopted
  adrs:
    - 10
    - 14
  adr_exceptions:
    10: "komodo-prod-01 has no registered Komodo Stack for Hawser — same bootstrap-circularity gap as stacks/komodo/compose.yml, tracked in CLAUDE.md's Docker-management coverage gap note."

services:
  hawser:
    image: ghcr.io/finsys/hawser:latest
    container_name: hawser
    restart: unless-stopped
    ports:
      - "2376:2376"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TOKEN=${HAWSER_TOKEN_KOMODO_PROD_01}
      - PORT=2376
