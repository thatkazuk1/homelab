x-meta:
  name: homeassistant
  host: core-01
  category: home-automation
  description: >
    Home Assistant — home automation hub with Zigbee/Z-Wave and Bluetooth
    device passthrough.
  status: adopted
  public_url: ha.ts.kazuki.uk

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/vhci:/dev/vhci
    volumes:
      - /opt/homelab/homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus
    environment:
      - TZ=Africa/Lagos
