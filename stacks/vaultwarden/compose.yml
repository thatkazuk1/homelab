x-meta:
  name: vaultwarden
  host: docker-prod-01
  category: password-management
  description: >
    A self-hosted, Bitwarden-compatible password vault — holds the fleet's
    actual password data.
  status: adopted
  adrs:
    - 10

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - PUID
      - PGID
      - TZ
      - DOMAIN
      - SIGNUPS_ALLOWED
    ports:
      - "8000:80"
    volumes:
      - /opt/homelab/vaultwarden/data:/data
