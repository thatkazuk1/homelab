services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /opt/homelab/homepage/assets/icons:/app/public/icons
      - /opt/homelab/homepage/assets/images:/app/public/images
      - /opt/homelab/homepage/config:/app/config
    networks:
      - private
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_VAR_ALLOWED_HOSTS}
      - KOMODO_ADOPTION_VERIFIED=true
      - PUID
      - PGID
      - TZ
      - HOMEPAGE_VAR_ALLOWED_HOSTS
      - HOMEPAGE_VAR_PROXMOX_URL
      - HOMEPAGE_VAR_PROXMOX_TOKEN_ID
      - HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET
      - HOMEPAGE_VAR_PROXMOXBACKUPSERVER_URL
      - HOMEPAGE_VAR_PROXMOXBACKUPSERVER_TOKEN_ID
      - HOMEPAGE_VAR_PROXMOXBACKUPSERVER_TOKEN_SECRET
      - HOMEPAGE_VAR_OPNSENSE_USERNAME
      - HOMEPAGE_VAR_OPNSENSE_PASSWORD
      - HOMEPAGE_VAR_ADGUARD_USERNAME
      - HOMEPAGE_VAR_ADGUARD_PASSWORD
      - HOMEPAGE_VAR_ADGUARD_USERNAME_ONE
      - HOMEPAGE_VAR_ADGUARD_PASSWORD_ONE
      - HOMEPAGE_VAR_TAILSCALE_DEVICE_ID
      - HOMEPAGE_VAR_TAILSCALE_API_KEY
      - HOMEPAGE_VAR_CLOUDFLARE_ACCOUNT_ID
      - HOMEPAGE_VAR_CLOUDFLARE_TUNNEL_ID
      - HOMEPAGE_VAR_CLOUDFLARE_API_KEY
      - HOMEPAGE_VAR_CROWDSEC_USERNAME
      - HOMEPAGE_VAR_CROWDSEC_PASSWORD
      - HOMEPAGE_VAR_PORTAINER_ACCESS_KEY
      - HOMEPAGE_VAR_BESZEL_USERNAME
      - HOMEPAGE_VAR_BESZEL_PASSWORD
      - HOMEPAGE_VAR_SPEEDTEST_TRACKER_API_KEY
      - HOMEPAGE_VAR_HOMEASSISTANT_API_KEY
      - HOMEPAGE_VAR_JELLYFIN_API_KEY
      - HOMEPAGE_VAR_PLEX_API_KEY
      - HOMEPAGE_VAR_JELLYSEERR_API_KEY
      - HOMEPAGE_VAR_PROWLARR_API_KEY
      - HOMEPAGE_VAR_RADARR_API_KEY
      - HOMEPAGE_VAR_SONARR_API_KEY
      - HOMEPAGE_VAR_LIDARR_API_KEY
      - HOMEPAGE_VAR_BAZARR_API_KEY
      - HOMEPAGE_VAR_JELLYSTAT_API_KEY
      - HOMEPAGE_VAR_QBITTORRENT_USERNAME
      - HOMEPAGE_VAR_QBITTORRENT_PASSWORD
      - HOMEPAGE_VAR_GLUETUN_API_KEY
      - HOMEPAGE_VAR_BACKREST_USERNAME
      - HOMEPAGE_VAR_BACKREST_PASSWORD
      - HOMEPAGE_VAR_SYNCTHING_API_KEY
      - HOMEPAGE_VAR_SLSKD_API_KEY
      - HOMEPAGE_VAR_K8s_API_KEY
      - HOMEPAGE_VAR_NTFY_TOKEN

networks:
  private:
    external: true
