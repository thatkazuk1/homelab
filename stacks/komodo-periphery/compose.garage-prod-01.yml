# Meta-infrastructure — not Komodo-managed.
# Deployed and updated manually on garage-prod-01.
# This file is documentation of the running config; not the deployment source of truth.
# Same structural variant as proxy/telemetry/plane-prod-01, except
# PERIPHERY_CORE_PUBLIC_KEYS is hardcoded here rather than ${VAR}-substituted from
# .env — real drift, not normalized here. Not a credential: this is Komodo Core's
# public verification key, meant to be shared, not a secret.

x-meta:
  name: komodo-periphery-garage-prod-01
  host: garage-prod-01
  category: meta-infra
  description: >
    Custom Komodo Periphery agent (sops + age baked in) enabling
    `sops exec-env` secret decryption at deploy time. Deployed and
    updated manually per host — not Komodo-managed itself (bootstrap
    circularity: Komodo can't manage the agent that runs Komodo's
    per-host connection).
  status: meta-infra
  adrs:
    - 5

name: komodo-periphery

services:
  periphery:
    image: forgejo.ts.kazuki.uk/shokunbi/komodo-periphery-sops:2
    container_name: komodo-periphery
    restart: unless-stopped
    init: true
    labels:
      komodo.skip:
    ports:
      - "8120:8120"
    environment:
      - PERIPHERY_ROOT_DIRECTORY=/etc/komodo
      - PERIPHERY_DISABLE_TERMINALS=false
      - PERIPHERY_CORE_PUBLIC_KEYS=MCowBQYDK2VuAyEAIAM4kk8DRPlx2wTihDDYYRgD64lBmz+I/OPOAtcikR0=
      - SOPS_AGE_KEY_FILE=/config/age-keys.txt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /etc/komodo:/etc/komodo
      - ./keys:/config/keys
      - /home/kazuki/.config/sops/age/keys.txt:/config/age-keys.txt:ro
