# Meta-infrastructure — not Komodo-managed.
# Deployed and updated manually on nas-01 (TerraMaster TOS 7).
# This file is documentation of the running config; not the deployment source of truth.
# Own path convention (/Volume1/@apps/komodo) and age-key mount per ADR-0006's
# TOS exception — pre-existing (ADR-0009), not re-verified against live state
# since Sprint 3i (no TOS browser terminal session available that day).

x-meta:
  name: komodo-periphery-nas-01
  host: nas-01
  category: meta-infra
  description: >
    Custom Komodo Periphery agent (sops + age baked in) enabling
    `sops exec-env` secret decryption at deploy time. Deployed and
    updated manually per host — not Komodo-managed itself (bootstrap
    circularity: Komodo can't manage the agent that runs Komodo's
    per-host connection).
  status: meta-infra
  adrs:
    - 5

name: komodo-periphery

services:
  periphery:
    image: forgejo.ts.kazuki.uk/shokunbi/komodo-periphery-sops:2
    container_name: komodo-periphery
    restart: unless-stopped
    init: true
    labels:
      komodo.skip:
    ports:
      - "8120:8120"
    environment:
      - PERIPHERY_ROOT_DIRECTORY=/data/komodo
      - PERIPHERY_DISABLE_TERMINALS=false
      - PERIPHERY_CORE_PUBLIC_KEYS=${PERIPHERY_CORE_PUBLIC_KEYS}
      - SOPS_AGE_KEY_FILE=/config/age-keys.txt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /Volume1/@apps/komodo:/data/komodo
      - ./keys:/config/keys
      - /Volume1/@apps/homelab/komodo-periphery/age-keys.txt:/config/age-keys.txt:ro
