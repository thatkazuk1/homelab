# Meta-infrastructure — not Komodo-managed.
# Deployed and updated manually on docker-prod-01.
# This file is documentation of the running config; not the deployment source of truth.
# docker-prod-01's Periphery diverges from the proxy/telemetry/plane/garage/core-01
# variant: map-style `environment:` block, explicit `env_file: .env` container
# injection (those hosts rely on compose's implicit `.env` substitution only), and
# a PERIPHERY_DISABLE_CONTAINER_EXEC var the others don't set. Real drift, not
# normalized here — see Sprint 3i status report.

x-meta:
  name: komodo-periphery-docker-prod-01
  host: docker-prod-01
  category: meta-infra
  description: >
    Custom Komodo Periphery agent (sops + age baked in) enabling
    `sops exec-env` secret decryption at deploy time. Deployed and
    updated manually per host — not Komodo-managed itself (bootstrap
    circularity: Komodo can't manage the agent that runs Komodo's
    per-host connection).
  status: meta-infra
  adrs:
    - 5

name: komodo-periphery

services:
  periphery:
    image: forgejo.ts.kazuki.uk/shokunbi/komodo-periphery-sops:2
    container_name: komodo-periphery
    init: true
    restart: unless-stopped
    labels:
      komodo.skip:
    ports:
      - 8120:8120
    env_file:
      - .env
    environment:
      PERIPHERY_ROOT_DIRECTORY: ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
      PERIPHERY_DISABLE_TERMINALS: false
      PERIPHERY_DISABLE_CONTAINER_EXEC: false
      SOPS_AGE_KEY_FILE: /config/age-keys.txt
    volumes:
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
      - /proc:/proc
      - /var/run/docker.sock:/var/run/docker.sock
      - ./keys:/config/keys
      - /home/kazuki/.config/sops/age/keys.txt:/config/age-keys.txt:ro
